<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legislative District Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css?v=20260416b" />
  <script>
    (function () {
      var expires = localStorage.getItem("rslc_auth_expires");
      if (!expires || Date.now() >= Number(expires)) {
        document.documentElement.classList.add("auth-pending");
      }
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <h1>State Legislative District Explorer</h1>
    <div class="topbar-layout">
      <div class="topbar-left">
        <div class="controls-row controls-row-primary">
          <span class="control-label-inline">State</span>
          <select id="stateSelect">
            <option value="">Select State...</option>
          </select>
          <button id="exitStateBtn" type="button" hidden>Exit State</button>
          <div class="chamber-buttons">
            <button id="houseChamberBtn" type="button">Lower Chamber</button>
            <button id="senateChamberBtn" type="button">Upper Chamber</button>
            <button id="statewideChamberBtn" type="button">Statewide</button>
          </div>
        </div>
        <div class="controls-row controls-row-secondary">
          <div id="mapViewButtons" class="mapview-buttons"></div>
          <div class="overlay-toggles">
            <label class="county-overlay-label" hidden>
              <input id="countyOverlayToggle" type="checkbox" />
              County Overlay
            </label>
            <label class="county-overlay-label">
              <input id="upIn2026Toggle" type="checkbox" />
              Up in 2026
            </label>
            <label class="county-overlay-label">
              <input id="targetDistrictsToggle" type="checkbox" />
              Target Districts
            </label>
            <label class="county-overlay-label">
              <input id="congressionalOverlayToggle" type="checkbox" />
              CD Overlay
            </label>
            <label class="county-overlay-label">
              <input id="cdFilterToggle" type="checkbox" />
              Target CD Filter
            </label>
          </div>
        </div>
      </div>
      <div id="projectionControls" class="projection-controls" hidden>
        <div class="projection-top-row">
          <button id="projectionToggleBtn" type="button" class="projection-toggle-btn">2026 Projection</button>
          <div class="projection-base-buttons">
            <button id="projectionBaseLegBtn" type="button" class="projection-base-btn">Latest Leg</button>
            <button id="projectionBasePresBtn" type="button" class="projection-base-btn">2024 Pres</button>
          </div>
        </div>
        <div class="projection-bottom-row">
          <div class="projection-slider-shell">
            <div class="projection-slider-labels">
              <span id="projectionRangeDem" class="projection-range-end projection-range-dem">D+25</span>
              <span id="projectionZeroLabel" class="projection-zero-label">0</span>
              <span id="projectionRangeRep" class="projection-range-end projection-range-rep">R+5</span>
            </div>
            <div class="projection-slider-track-wrap">
              <div id="projectionShiftSlider" class="projection-shift-slider" role="slider" tabindex="0" aria-valuemin="-5" aria-valuemax="25" aria-valuenow="0" aria-valuetext="EVEN" aria-orientation="horizontal">
                <div id="projectionSliderAxis" class="projection-slider-axis">
                  <div class="projection-slider-rail">
                    <div id="projectionSliderFill" class="projection-slider-fill"></div>
                  </div>
                  <div id="projectionSliderTicks" class="projection-slider-ticks" aria-hidden="true"></div>
                  <div id="projectionSliderThumb" class="projection-slider-thumb"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="projection-shift-box">
            <span id="projectionShiftValue" class="projection-shift-value">EVEN</span>
            <span class="projection-shift-caption">Shift</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section id="map"></section>
    <aside class="sidebar">
      <h2 id="detailsTitle">National Overview</h2>
      <div id="details"><div class="loading-indicator">Loading national overview table...</div></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
  <script type="module" src="app.js?v=20260416b"></script>
</body>
</html>
